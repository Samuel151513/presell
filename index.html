<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #0f001f 100%);
    padding: 30px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(75, 0, 130, 0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    width: 100%;
  }

  /* FOTO DE PERFIL */
  .profile-photo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid rgba(138, 43, 226, 0.7);
    box-shadow: 0 0 24px rgba(138, 43, 226, 0.4), 0 0 60px rgba(138, 43, 226, 0.15);
    margin-bottom: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  /* BADGE */
  .badge {
    display: inline-block;
    background: rgba(138, 43, 226, 0.2);
    border: 1px solid rgba(138, 43, 226, 0.5);
    color: #b366ff;
    font-size: 0.75rem;
    padding: 8px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 30px;
    font-weight: 600;
  }

  /* TÍTULO */
  h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(2.5rem, 10vw, 4.5rem);
    color: #fff;
    line-height: 1.1;
    margin-bottom: 16px;
    font-weight: 900;
    letter-spacing: -1px;
  }

  h1 span {
    background: linear-gradient(135deg, #b366ff 0%, #7b2cbf 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* BOTÃO DE ACESSO */
  .access-button {
    display: inline-block;
    background: linear-gradient(135deg, #b366ff 0%, #7b2cbf 100%);
    color: white;
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 16px 48px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    box-shadow: 0 8px 32px rgba(138, 43, 226, 0.3);
    transition: all 0.3s ease;
    margin-bottom: 30px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .access-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 48px rgba(138, 43, 226, 0.5);
  }

  .access-button:active {
    transform: translateY(-1px);
  }

  .access-button.loading {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .access-button svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  /* MENSAGEM DE SUCESSO */
  #success {
    font-size: 1.1rem;
    color: #7bff00;
    font-weight: 700;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.3s ease;
    animation: successPulse 0.6s ease;
  }

  #success.show {
    visibility: visible;
    opacity: 1;
  }

  @keyframes successPulse {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* RESPONSIVIDADE */
  @media (max-width: 480px) {
    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
    }

    .access-button {
      font-size: 1rem;
      padding: 14px 40px;
      width: 100%;
      max-width: 100%;
    }
  }

  /* ANIMAÇÃO DE ENTRADA */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .container {
    animation: fadeInUp 0.6s ease;
  }
</style>
</head>
